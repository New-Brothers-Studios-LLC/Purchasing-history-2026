<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soporte de Ventas | New Brothers Studios</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00ff88;
            --bg-dark: #080808;
            --card-surface: #121212;
            --accent-blue: #00d4ff;
        }

        body {
            background: var(--bg-dark);
            color: #e0e0e0;
            font-family: 'Poppins', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-image: radial-gradient(circle at 10% 20%, rgba(0, 255, 136, 0.05) 0%, transparent 40%);
        }

        /* Animaciones */
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .main-card {
            background: var(--card-surface);
            width: 100%;
            max-width: 500px;
            border-radius: 24px;
            padding: 40px;
            border: 1px solid #222;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
            animation: slideUp 0.7s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .header-logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .header-logo h1 {
            font-size: 1.4rem;
            letter-spacing: 2px;
            background: linear-gradient(to right, #00ff88, #00d4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
        }

        input {
            width: 100%;
            padding: 16px;
            margin-bottom: 15px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            transition: 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.1);
        }

        button.btn-login {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: black;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }

        button.btn-login:hover {
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.4);
        }

        /* Historial Personalizado */
        .history-container {
            max-height: 550px;
            overflow-y: auto;
            padding-right: 10px;
        }

        .ticket {
            background: #181818;
            border: 1px solid #282828;
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 15px;
            position: relative;
            transition: 0.3s;
        }

        .ticket:hover {
            border-color: var(--primary);
            background: #1d1d1d;
        }

        .ticket-header { color: var(--primary); font-weight: 700; margin-bottom: 10px; }
        .ticket-body { font-size: 0.85rem; line-height: 1.7; color: #bbb; }
        .ticket-body b { color: #fff; }
        .ticket-footer { 
            margin-top: 15px; 
            padding-top: 10px; 
            border-top: 1px dashed #333; 
            font-size: 0.75rem; 
            color: #666; 
            text-align: center;
        }

        .status-processing { color: #ffab00; font-weight: bold; }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="main-card" id="loginUI">
        <div class="header-logo">
            <h1>NEW BROTHERS STUDIOS</h1>
            <p style="font-size: 0.7rem; color: #666;">AUTENTICACIÓN DE CLIENTE</p>
        </div>
        <input type="text" id="userInput" placeholder="ID de Usuario">
        <input type="password" id="passInput" placeholder="Llave de Acceso">
        <button class="btn-login" onclick="validate()">Ingresar al Historial</button>
        <p id="error" style="color: #ff5252; text-align: center; font-size: 0.8rem;" class="hidden">Acceso Denegado</p>
    </div>

    <div class="main-card hidden" id="historyUI" style="max-width: 600px;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 style="margin: 0; font-size: 1.2rem;">Historial de <span id="userSpan" style="color:var(--primary)"></span></h2>
            <button onclick="location.reload()" style="background: none; border: 1px solid #444; color: #888; border-radius: 8px; cursor: pointer; padding: 5px 10px;">Cerrar</button>
        </div>
        
        <div class="history-container" id="ticketList">
            </div>
    </div>

    <script>
        function validate() {
            const user = document.getElementById('userInput').value;
            const pass = document.getElementById('passInput').value;
            
            if(user === "LXVX XFRXXN" && pass === "8645") {
                loadHistory();
            } else {
                document.getElementById('error').classList.remove('hidden');
            }
        }

        function loadHistory() {
            document.getElementById('loginUI').classList.add('hidden');
            const historyUI = document.getElementById('historyUI');
            historyUI.classList.remove('hidden');
            document.getElementById('userSpan').innerText = "LXVX XFRXXN";

            const tickets = [
                { r: "2,000", p: "$24.99", id: "18817598613", extra: "" },
                { r: "2,000 Robux + Paquete de semillas premium (Gratis)!", p: "$24.99", id: "18817598613", extra: "" },
                { r: "2,000 Robux + Paquete de semillas premium (Gratis)!", p: "$24.99", id: "18817598613", extra: "" },
                { r: "2,000 Robux + 40 extra, *Supervivencia de desastres naturales; Globo Verde 🎈*(Gratis)!", p: "$24.99 + $5.00 donación", id: "18817598619", extra: "" },
                { r: "740", p: "$10.99", id: "18817598651", extra: "" },
                { r: "280", p: "<span class='status-processing'>En proceso..</span>", id: "--.--.--.--.--", extra: "" }
            ];

            const list = document.getElementById('ticketList');
            tickets.forEach((t, i) => {
                const card = document.createElement('div');
                card.className = 'ticket';
                card.style.animation = `slideUp 0.5s ease forwards ${i * 0.1}s`;
                card.style.opacity = "0";
                
                card.innerHTML = `
                    <div class="ticket-header">Gracias por tu compra 🍀</div>
                    <div class="ticket-body">
                        ID de la compra<br><br>
                        <b>Robux:</b> ${t.r}<br>
                        <b>Pagar:</b> ${t.p}<br>
                        <b>ID:</b> ${t.id}<br>
                        <b>Pago:</b> PaySafeCard
                    </div>
                    <div class="ticket-footer">Gracias por comprar con NewBrothersStudios.com</div>
                `;
                list.appendChild(card);
            });
        }
    </script>
</body>
</html>
